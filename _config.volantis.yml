############################### Sidebar ############################### > start
sidebar:
  position: right # left right
  # 主页、分类、归档等独立页面
  for_page: [blogger, category, tagcloud, qrcode, webinfo, lastupdate, repos]
  # layout: docs/post 这类文章页面
  for_post: [toc]
  # 侧边栏组件库
  widget_library:
    # ---------------------------------------
    # blogger info widget
    blogger:
      class: blogger
      display: [desktop, mobile] # [desktop, mobile]
      avatar: images/Profile_Picture.jpg # https://cdn.jsdelivr.net/gh/volantis-x/cdn-org/blog/Logo-NavBar@3x.png
      shape: circle # circle, rectangle
      url: /about/
      title: Dawnqi
      subtitle:
      jinrishici: 穷且益坚，不坠青云之志 # Poetry Today. You can set a string, and it will be displayed when loading fails.
      social:
        - icon: fa-brands fa-steam
          url: https://s.team/p/fjbm-tpwc/cwvgpgmg
        - icon: fa-solid fa-envelope
          url: mailto:Dawnqi@qq.com
        - icon: fab fa-github
          url: https://github.com/dawnqi2-cyber
        - icon: fa-solid fa-headphones-alt
          url: /
    # ---------------------------------------
    # toc widget (valid only in articles)
    toc:
      class: toc
      display: [desktop, mobile] # [desktop, mobile]
      sticky: true
      header:
        icon: fa-solid fa-list
        title: 本文目录
      list_number: false
      min_depth: 2
      max_depth: 5
    # ---------------------------------------
    # music
    music:
      class: music
      display: [desktop, mobile] # [desktop, mobile]
      pjaxReload: false
    # ---------------------------------------
    # category widget
    category:
      class: category
      display: [desktop] # [desktop, mobile]
      header:
        icon: fa-solid fa-folder-open
        title: 文章分类
        url: /blog/categories/
    # ---------------------------------------
    # tagcloud widget
    tagcloud:
      class: tagcloud
      display: [desktop, mobile] # [desktop, mobile]
      header:
        icon: fa-solid fa-tags
        title: 热门标签
        url: /blog/tags/
      min_font: 14
      max_font: 24
      color: true
      start_color: '#999'
      end_color: '#555'
    # ---------------------------------------
    # qrcode widget
    qrcode:
      class: qrcode
      display: [desktop, mobile] # [desktop, mobile]
      height: 64px  # Automatic height if not set
      images:
        - images/QQ.png # https://cdn.jsdelivr.net/gh/volantis-x/cdn-org/blog/qrcode/github@volantis.png
        - images/wx.png # https://cdn.jsdelivr.net/gh/volantis-x/cdn-org/blog/qrcode/github@volantis.png
    # ---------------------------------------
    # webinfo widget
    webinfo:
      class: webinfo
      display: [desktop]
      header:
        icon: fa-solid fa-award
        title: 站点信息
      type:
        article:
          enable: true
          text: '文章数目：'
          unit: '篇'
        runtime:
          enable: false
          data: '2020/01/01'    # 填写建站日期
          text: '已运行时间：'
          unit: '天'
        wordcount:
          enable: false
          text: '本站总字数：'   # 需要启用 wordcount
          unit: '字'
        visitcounter:
          siteuv:
            enable: false
            text: '本站访客数：'
            unit: '人'
          sitepv:
            enable: false
            text: '本站总访问量：'
            unit: '次'
        lastupd:
          enable: true
          friendlyShow: true    # 更友好的时间显示
          text: '最后活动时间：'
          unit: '日'
    # ---------------------------------------
    # lastupdate widget
    lastupdate:
      class: lastupdate
      display: [desktop]
      header:
        icon: fa-solid fa-clock WISTERIA
        title: 最近更新
    # media:
    #   class: media
    #   display: [desktop, mobile]
    #   header:
    #     icon: fab fa-qq  # 修复图标语法
    #     title: 联系我
    #   content:
    #     - '[QQ群](https://jq.qq.com/?_wv=1027&k=xxxxxxxx)'
    #     - '[GitHub](https://github.com/yourusername)'
    #     - '[邮箱](mailto:your-email@example.com)'

    repos:
      class: text
      display: [desktop]
      header:
        icon: fab fa-github
        title: 点个赞吧
        url: https://baidu.com
      content:
        - '您的赞对我来说很重要，如果您喜欢本主题，希望能够给下面的项目点个赞来支持一下。'
        - '[](https://github.com/xaoxuu/ProHUD)'
        - '[](https://github.com/xaoxuu/ValueX)'
        - '[](https://github.com/xaoxuu/Inspire)'
    
    
############################### Sidebar ############################### > end


